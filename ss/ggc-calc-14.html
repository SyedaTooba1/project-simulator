<body>
  <h1 class="header">GGC Calculator</h1>

  <div class="test">
    <!-- Distribution Type Selection -->
    <label for="interarrivalType">Select Interarrival Distribution:</label>
    <select id="interarrivalType" onchange="updateGGCInputs()">
      <option value="">--Select--</option>
      <option value="uniform">Uniform Distribution</option>
      <option value="gamma">Gamma Distribution</option>
      <option value="normal">Normal Distribution</option>
    </select>

    <!-- Interarrival Inputs -->
    <div id="uniformGgcInputs" class="">
      <input type="text" id="uniformMin" placeholder="Enter Min Value">
      <input type="text" id="uniformMax" placeholder="Enter Max Value">
    </div>

    <div id="gammaGgcInputs" class="hidden">
      <input type="text" id="gammaMean" placeholder="Enter alpha">
      <input type="text" id="gammaShape" placeholder="Enter beta">
    </div>

    <div id="normalGgcInputs" class="hidden">
      <input type="text" id="normalMean" placeholder="Enter Mean">
      <input type="text" id="normalSD" placeholder="Enter Standard Deviation">
    </div>

    <!-- Service Time Distribution Selection -->
    <label for="serviceType">Select Service Distribution:</label>
    <select id="serviceType" onchange="updateGGCInputs()">
      <option value="">--Select--</option>
      <option value="uniform">Uniform Distribution</option>
      <option value="gamma">Gamma Distribution</option>
      <option value="normal">Normal Distribution</option>
    </select>

    <!-- Service GgcInputs -->
    <div id="serviceUniformGgcInputs" class="hidden">
      <input type="text" id="serviceUniformMin" placeholder="Enter Min Value">
      <input type="text" id="serviceUniformMax" placeholder="Enter Max Value">
    </div>

    <div id="serviceGammaGgcInputs" class="">
      <input type="text" id="serviceGammaMean" placeholder="Enter alpha">
      <input type="text" id="serviceGammaShape" placeholder="Enter beta">
    </div>

    <div id="serviceNormalGgcInputs" class="hidden">
      <input type="text" id="serviceNormalMean" placeholder="Enter Mean">
      <input type="text" id="serviceNormalSD" placeholder="Enter Standard Deviation">
    </div>
    <input type="text" placeholder="Servers" id="Servers">

    <button type="button" onclick="ggc();" class="btn btn-lg" id="btn">Calculate</button>
  </div>

  <div id="show">
